 163); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-family: &quot;DM Sans&quot;, &quot;Segoe UI&quot;, system-ui, sans-serif;">Copy to Excel</button><button style="flex: 1 1 0%; padding: 11px 0px; background: none; border-top: none; border-right: none; border-bottom: 2px solid transparent; border-left: none; border-image: initial; color: rgb(141, 150, 163); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-family: &quot;DM Sans&quot;, &quot;Segoe UI&quot;, system-ui, sans-serif;">Settings</button></div><div style="max-width: 820px; margin: 0px auto; padding: 16px 14px 80px;"><div style="background: rgb(255, 255, 255); border-radius: 14px; border: 1px solid rgb(221, 225, 232); padding: 16px; margin-bottom: 14px;"><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;"><div><div style="font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgb(141, 150, 163); margin-bottom: 4px;">Claimant Name</div><input placeholder="Full name" value="" style="width: 100%; padding: 10px 14px; background: rgb(245, 246, 248); border: 1px solid rgb(221, 225, 232); border-radius: 8px; color: rgb(26, 26, 26); font-size: 13px; font-family: &quot;JetBrains Mono&quot;, &quot;Fira Code&quot;, monospace; outline: none; transition: border-color 0.2s; box-sizing: border-box;"></div><div><div style="font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgb(141, 150, 163); margin-bottom: 4px;">Designation</div><input placeholder="e.g. Second Secretary" value="" style="width: 100%; padding: 10px 14px; background: rgb(245, 246, 248); border: 1px solid rgb(221, 225, 232); border-radius: 8px; color: rgb(26, 26, 26); font-size: 13px; font-family: &quot;JetBrains Mono&quot;, &quot;Fira Code&quot;, monospace; outline: none; transition: border-color 0.2s; box-sizing: border-box;"></div></div></div><div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px;"><div style="background: rgb(255, 255, 255); border-radius: 10px; border: 1px solid rgb(221, 225, 232); padding: 11px 6px; text-align: center;"><div style="font-size: 14px; font-weight: 700; font-family: &quot;JetBrains Mono&quot;, &quot;Fira Code&quot;, monospace;">1</div><div style="font-size: 8px; font-weight: 700; letter-spacing: 1.3px; color: rgb(141, 150, 163); text-transform: uppercase; margin-top: 2px;">Entries</div></div><div style="background: rgb(255, 255, 255); border-radius: 10px; border: 1px solid rgb(221, 225, 232); padding: 11px 6px; text-align: center;"><div style="font-size: 14px; font-weight: 700; font-family: &quot;JetBrains Mono&quot;, &quot;Fira Code&quot;, monospace;">₹0</div><div style="font-size: 8px; font-weight: 700; letter-spacing: 1.3px; color: rgb(141, 150, 163); text-transform: uppercase; margin-top: 2px;">Total INR</div></div><div style="background: rgb(255, 255, 255); border-radius: 10px; border: 1px solid rgb(221, 225, 232); padding: 11px 6px; text-align: center;"><div style="font-size: 14px; font-weight: 700; font-family: &quot;JetBrains Mono&quot;, &quot;Fira Code&quot;, monospace;">S$0.00</div><div style="font-size: 8px; font-weight: 700; letter-spacing: 1.3px; color: rgb(141, 150, 163); text-transform: uppercase; margin-top: 2px;">Total SGD</div></div><div style="background: rgb(255, 255, 255); border-radius: 10px; border: 1px solid rgb(221, 225, 232); padding: 11px 6px; text-align: center;"><div style="font-size: 14px; font-weight: 700; font-family: &quot;JetBrains Mono&quot;, &quot;Fira Code&quot;, monospace;">0</div><div style="font-size: 8px; font-weight: 700; letter-spacing: 1.3px; color: rgb(141, 150, 163); text-transform: uppercase; margin-top: 2px;">Guests</div></div></div><div style="background: rgb(255, 255, 255); border-radius: 14px; border: 1px solid rgb(221, 225, 232); margin-bottom: 10px; overflow: hidden;"><div style="padding: 11px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: transparent;"><div style="display: flex; align-items: center; gap: 10px; min-width: 0px;"><span style="font-size: 11px; font-weight: 700; font-family: &quot;JetBrains Mono&quot;, &quot;Fira Code&quot;, monospace; color: rgb(192, 57, 43);">#1</span><div style="min-width: 0px;"><div style="font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">New Entry</div><div style="font-size: 10px; color: rgb(95, 107, 122);">No date · Lunch · 0 pax</div></div></div><div style="display: flex; align-items: center; gap: 8px; flex-shrink: 0;"><span style="font-family: &quot;JetBrains Mono&quot;, &quot;Fira Code&quot;, monospace; font-size: 12px; font-weight: 700;">₹0</span><span style="font-size: 13px; color: rgb(141, 150, 163); transform: none; transition: transform 0.2s;">▾</span></div></div></div><button style="width: 100%; padding: 12px; background: rgb(255, 255, 255); border: 1px dashed rgb(221, 225, 232); border-radius: 14px; color: rgb(192, 57, 43); font-size: 12px; font-weight: 700; cursor: pointer; font-family: &quot;DM Sans&quot;, &quot;Segoe UI&quot;, system-ui, sans-serif; margin-top: 2px;">+ Add Claim Entry</button></div></div></div>
<script type="text/babel">
const { useState, useRef, useMemo } = React;

const FX_RATE = 70.74;
const BASE_RATE = 63.57;
const MEAL_CAPS = {
  "Breakfast/Tea": { base: Math.floor(50 * BASE_RATE), hbs120: Math.floor(1.2 * Math.floor(50 * BASE_RATE)), hom150: Math.floor(1.5 * Math.floor(50 * BASE_RATE)) },
  Lunch: { base: Math.floor(85 * BASE_RATE), hbs120: Math.floor(1.2 * Math.floor(85 * BASE_RATE)), hom150: Math.floor(1.5 * Math.floor(85 * BASE_RATE)) },
  Dinner: { base: Math.floor(120 * BASE_RATE), hbs120: Math.floor(1.2 * Math.floor(120 * BASE_RATE)), hom150: Math.floor(1.5 * Math.floor(120 * BASE_RATE)) },
};

const uid = () => Math.random().toString(36).slice(2, 10);
const emptyEntry = () => ({ id: uid(), date: "", venue: "", occasion: "", mealType: "Lunch", pax: "", costINR: "", alcohol: "", tips: "", remarks: "", guests: [] });
const emptyGuest = () => ({ id: uid(), name: "", designation: "", organisation: "" });

const V = {
  bg: "#f5f6f8", surface: "#ffffff", card: "#ffffff", border: "#dde1e8", borderHi: "#c0392b",
  accent: "#c0392b", accentDim: "rgba(192,57,43,0.07)", accentGlow: "rgba(192,57,43,0.2)",
  text: "#1a1a1a", dim: "#5f6b7a", muted: "#8d96a3",
  green: "#1e8449", greenBg: "rgba(30,132,73,0.08)",
  amber: "#b7791f", amberBg: "rgba(183,121,31,0.08)",
  red: "#c0392b", redBg: "rgba(192,57,43,0.07)",
  white: "#ffffff",
};
const mono = "'JetBrains Mono','Fira Code',monospace";
const sans = "'DM Sans','Segoe UI',system-ui,sans-serif";

function calc(e) {
  const cost = parseFloat(e.costINR) || 0, alc = parseFloat(e.alcohol) || 0, tip = parseFloat(e.tips) || 0;
  const totalINR = cost + alc + tip, totalSGD = totalINR / FX_RATE;
  const pax = parseInt(e.pax) || 0, sgdPerPax = pax > 0 ? totalSGD / pax : 0, inrPerPax = pax > 0 ? totalINR / pax : 0;
  const cap = MEAL_CAPS[e.mealType] || MEAL_CAPS.Lunch;
  const capStatus = inrPerPax === 0 ? "none" : inrPerPax <= cap.base ? "ok" : inrPerPax <= cap.hbs120 ? "hom" : "over";
  return { totalINR, totalSGD, sgdPerPax, inrPerPax, cap, capStatus };
}

function sortByDate(entries) {
  return [...entries].sort(function(a, b) {
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return a.date.localeCompare(b.date);
  });
}

function CapBadge({ status }) {
  if (status === "none") return null;
  const m = { ok: { l: "Within Cap", bg: V.greenBg, c: V.green, i: "\u2713" }, hom: { l: "HOM Approval", bg: V.amberBg, c: V.amber, i: "\u26A0" }, over: { l: "Exceeds Limit", bg: V.redBg, c: V.red, i: "\u2715" } };
  const d = m[status];
  return <span style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "2px 9px", borderRadius: 99, background: d.bg, color: d.c, fontSize: 10, fontWeight: 700, whiteSpace: "nowrap" }}>{d.i} {d.l}</span>;
}

function Input({ small, style: xs, ...props }) {
  const [f, setF] = useState(false);
  return <input {...props} onFocus={e => { setF(true); if (props.onFocus) props.onFocus(e); }} onBlur={e => { setF(false); if (props.onBlur) props.onBlur(e); }}
    style={{ width: "100%", padding: small ? "7px 10px" : "10px 14px", background: V.bg, border: `1px solid ${f ? V.borderHi : V.border}`, borderRadius: 8, color: V.text, fontSize: small ? 12 : 13, fontFamily: mono, outline: "none", transition: "border-color 0.2s", boxSizing: "border-box", ...(xs || {}) }} />;
}

function Label({ children }) {
  return <div style={{ fontSize: 9, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.5, color: V.muted, marginBottom: 4 }}>{children}</div>;
}

function CopyButton({ tableRef, label }) {
  const [copied, setCopied] = useState(false);
  const doCopy = () => {
    const el = tableRef.current; if (!el) return;
    const range = document.createRange(); range.selectNodeContents(el);
    const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
    document.execCommand("copy"); sel.removeAllRanges();
    setCopied(true); setTimeout(() => setCopied(false), 2000);
  };
  return (
    <button onClick={doCopy} style={{
      padding: "9px 18px", background: copied ? V.greenBg : V.accent, border: copied ? `1px solid ${V.green}` : "none",
      borderRadius: 8, color: copied ? V.green : V.white, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: sans,
      boxShadow: copied ? "none" : `0 2px 10px ${V.accentGlow}`, transition: "all 0.2s",
    }}>{copied ? "\u2713 Copied!" : label}</button>
  );
}

function OcrModal({ onClose, onApply, apiKey }) {
  const [preview, setPreview] = useState(null);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const inputRef = useRef(); const fileRef = useRef(null);
  const handleFile = (f) => { if (!f) return; fileRef.current = f; setError(null); setResult(null); const r = new FileReader(); r.onload = () => setPreview(r.result); r.readAsDataURL(f); };
  const runOCR = async () => {
    if (!fileRef.current) return;
    if (!apiKey) { setError("Set your Anthropic API key in the Settings tab first."); return; }
    setLoading(true); setError(null);
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000,
          messages: [{ role: "user", content: [
            { type: "image", source: { type: "base64", media_type: fileRef.current.type || "image/jpeg", data: preview.split(",")[1] } },
            { type: "text", text: `Extract from this Indian restaurant receipt. ONLY valid JSON, no markdown:\n{"venue":"name","date":"YYYY-MM-DD","total_amount":number,"alcohol_amount":0,"tip_amount":0,"pax_estimate":null,"meal_type":"Lunch","items_summary":"brief"}` }
          ]}]
        })
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error.message);
      setResult(JSON.parse((data.content || []).map(b => b.text || "").join("").replace(/```json|```/g, "").trim()));
    } catch (err) { setError(err.message || "Could not process. Try a clearer photo."); } finally { setLoading(false); }
  };
  const handleApply = () => { if (!result) return; onApply({ date: result.date||"", venue: result.venue||"", occasion: result.items_summary||"", mealType: result.meal_type||"Lunch", pax: result.pax_estimate?String(result.pax_estimate):"", costINR: result.total_amount?String(result.total_amount):"", alcohol: result.alcohol_amount?String(result.alcohol_amount):"", tips: result.tip_amount?String(result.tip_amount):"" }); onClose(); };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 999, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: V.white, borderRadius: 16, border: `1px solid ${V.border}`, width: "100%", maxWidth: 460, maxHeight: "90vh", overflow: "auto", padding: 22, boxShadow: "0 20px 60px rgba(0,0,0,0.15)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: V.text }}>📸 Scan Receipt</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: V.muted, fontSize: 20, cursor: "pointer" }}>×</button>
        </div>
        {!preview && (
          <div onClick={() => inputRef.current && inputRef.current.click()} style={{ border: `2px dashed ${V.border}`, borderRadius: 12, padding: "36px 20px", textAlign: "center", cursor: "pointer" }}>
            <div style={{ fontSize: 34, marginBottom: 6 }}>🧾</div>
            <div style={{ fontSize: 13, fontWeight: 600, color: V.text }}>Tap to upload receipt</div>
            <div style={{ fontSize: 11, color: V.dim, marginTop: 2 }}>JPG, PNG, HEIC</div>
            <input ref={inputRef} type="file" accept="image/*" capture="environment" onChange={e => handleFile(e.target.files && e.target.files[0])} style={{ display: "none" }} />
          </div>
        )}
        {preview && !result && (
          <div>
            <div style={{ borderRadius: 10, overflow: "hidden", marginBottom: 12, border: `1px solid ${V.border}` }}>
              <img src={preview} alt="" style={{ width: "100%", display: "block", maxHeight: 260, objectFit: "contain", background: "#fafafa" }} />
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => { setPreview(null); fileRef.current = null; }} style={{ flex: 1, padding: 10, background: V.bg, border: `1px solid ${V.border}`, borderRadius: 10, color: V.dim, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: sans }}>Re-take</button>
              <button onClick={runOCR} disabled={loading} style={{ flex: 2, padding: 10, background: loading ? V.bg : V.accent, border: "none", borderRadius: 10, color: V.white, fontSize: 12, fontWeight: 700, cursor: loading ? "wait" : "pointer", fontFamily: sans, opacity: loading ? 0.7 : 1 }}>{loading ? "⏳ Extracting..." : "Extract Data"}</button>
            </div>
          </div>
        )}
        {error && <div style={{ marginTop: 12, padding: "9px 12px", background: V.redBg, borderRadius: 8, fontSize: 12, color: V.red }}>{error}</div>}
        {result && (
          <div>
            <Label>Extracted Data</Label>
            <div style={{ background: V.bg, borderRadius: 10, padding: 12, margin: "8px 0 14px" }}>
              {[["Venue", result.venue],["Date", result.date],["Meal", result.meal_type],["Bill", result.total_amount ? "\u20B9"+Number(result.total_amount).toLocaleString("en-IN") : "\u2014"],["Alcohol", result.alcohol_amount ? "\u20B9"+Number(result.alcohol_amount).toLocaleString("en-IN") : "\u2014"],["Tips", result.tip_amount ? "\u20B9"+Number(result.tip_amount).toLocaleString("en-IN") : "\u2014"],["Pax", result.pax_estimate || "\u2014"],["Items", result.items_summary]].map(function([k, v]) { return (
                <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", borderBottom: `1px solid ${V.border}` }}>
                  <span style={{ fontSize: 11, color: V.dim, fontWeight: 600 }}>{k}</span>
                  <span style={{ fontSize: 12, color: V.text, fontWeight: 500, textAlign: "right", maxWidth: "60%" }}>{v || "\u2014"}</span>
                </div>
              ); })}
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => { setResult(null); setPreview(null); fileRef.current = null; }} style={{ flex: 1, padding: 10, background: V.bg, border: `1px solid ${V.border}`, borderRadius: 10, color: V.dim, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: sans }}>Retry</button>
              <button onClick={handleApply} style={{ flex: 2, padding: 10, background: V.accent, border: "none", borderRadius: 10, color: V.white, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: sans }}>✓ Apply</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [claimant, setClaimant] = useState({ name: "", designation: "" });
  const [entries, setEntries] = useState([emptyEntry()]);
  const [tab, setTab] = useState("form");
  const [expandedId, setExpandedId] = useState(null);
  const [guestOpenId, setGuestOpenId] = useState(null);
  const [ocrTargetId, setOcrTargetId] = useState(null);
  const [apiKey, setApiKey] = useState(function() { try { return localStorage.getItem("anthropic_api_key") || ""; } catch(e) { return ""; } });
  const saveApiKey = function(val) { setApiKey(val); try { if (val) localStorage.setItem("anthropic_api_key", val); else localStorage.removeItem("anthropic_api_key"); } catch(e) {} };
  const claimTableRef = useRef(null);
  const guestTableRef = useRef(null);

  // Sort entries by date, oldest first; undated entries go to the bottom
  const sorted = useMemo(() => sortByDate(entries), [entries]);

  const updateById = (id, f, v) => setEntries(p => p.map(e => e.id === id ? { ...e, [f]: v } : e));
  const addEntry = () => { const ne = emptyEntry(); setEntries(p => [...p, ne]); setExpandedId(ne.id); };
  const removeEntry = (id) => { if (entries.length < 2) return; setEntries(p => p.filter(e => e.id !== id)); if (expandedId === id) setExpandedId(null); };
  const addGuest = (id) => setEntries(p => p.map(e => e.id === id ? { ...e, guests: [...e.guests, emptyGuest()] } : e));
  const updateGuest = (eid, gid, f, v) => setEntries(p => p.map(e => { if (e.id !== eid) return e; const g = e.guests.map(gg => gg.id === gid ? { ...gg, [f]: v } : gg); return { ...e, guests: g }; }));
  const removeGuest = (eid, gid) => setEntries(p => p.map(e => e.id !== eid ? e : { ...e, guests: e.guests.filter(g => g.id !== gid) }));
  const applyOcr = (data) => { if (!ocrTargetId) return; setEntries(p => p.map(e => e.id !== ocrTargetId ? e : { ...e, ...Object.fromEntries(Object.entries(data).filter(([, v]) => v !== "" && v !== null)) })); };

  const grandINR = entries.reduce((s, e) => s + calc(e).totalINR, 0);
  const grandSGD = entries.reduce((s, e) => s + calc(e).totalSGD, 0);
  const totalGuests = entries.reduce((s, e) => s + e.guests.length, 0);
  const fmtDate = (d) => { if (!d) return ""; const [y, m, dd] = d.split("-"); return dd + "/" + m + "/" + y; };

  const tCell = { padding: "7px 10px", border: "1px solid #d0d5dd", fontSize: 12, fontFamily: mono, color: "#000000", whiteSpace: "nowrap", background: "#ffffff" };
  const tHead = { ...tCell, background: "#f0f1f3", fontWeight: 700, fontSize: 10, letterSpacing: 0.8, color: "#333333", textTransform: "uppercase" };

  const allTabs = [["form", "Claims"], ["caps", "Caps"], ["export", "Copy to Excel"], ["settings", "Settings"]];

  return (
    <div style={{ minHeight: "100vh", background: V.bg, color: V.text, fontFamily: sans }}>
      {ocrTargetId && <OcrModal onClose={() => setOcrTargetId(null)} onApply={applyOcr} apiKey={apiKey} />}

      {/* Header */}
      <div style={{ background: V.white, borderBottom: `1px solid ${V.border}`, padding: "20px 22px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 36, height: 36, borderRadius: 10, background: V.accentDim, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>🇸🇬</div>
          <div>
            <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: 2.5, color: V.accent, textTransform: "uppercase" }}>New Delhi Mission</div>
            <div style={{ fontSize: 17, fontWeight: 700 }}>Entertainment Claim</div>
          </div>
        </div>
        <div style={{ fontSize: 10, color: V.muted, marginTop: 5 }}>FY2026 · S$1 = ₹{FX_RATE}</div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", background: V.white, borderBottom: `1px solid ${V.border}` }}>
        {allTabs.map(([k, l]) => (
          <button key={k} onClick={() => setTab(k)} style={{
            flex: 1, padding: "11px 0", background: "none", border: "none", borderBottom: tab === k ? `2px solid ${V.accent}` : "2px solid transparent",
            color: tab === k ? V.accent : V.muted, fontSize: 11, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", cursor: "pointer", fontFamily: sans,
          }}>{l}</button>
        ))}
      </div>

      <div style={{ maxWidth: 820, margin: "0 auto", padding: "16px 14px 80px" }}>

        {/* ═══ FORM ═══ */}
        {tab === "form" && <>
          <div style={{ background: V.card, borderRadius: 14, border: `1px solid ${V.border}`, padding: 16, marginBottom: 14 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <div><Label>Claimant Name</Label><Input value={claimant.name} onChange={e => setClaimant(p => ({ ...p, name: e.target.value }))} placeholder="Full name" /></div>
              <div><Label>Designation</Label><Input value={claimant.designation} onChange={e => setClaimant(p => ({ ...p, designation: e.target.value }))} placeholder="e.g. Second Secretary" /></div>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: 14 }}>
            {[{ l: "Entries", v: entries.length }, { l: "Total INR", v: "\u20B9"+grandINR.toLocaleString("en-IN", { maximumFractionDigits: 0 }) }, { l: "Total SGD", v: "S$"+grandSGD.toFixed(2) }, { l: "Guests", v: totalGuests }].map(s => (
              <div key={s.l} style={{ background: V.card, borderRadius: 10, border: `1px solid ${V.border}`, padding: "11px 6px", textAlign: "center" }}>
                <div style={{ fontSize: 14, fontWeight: 700, fontFamily: mono }}>{s.v}</div>
                <div style={{ fontSize: 8, fontWeight: 700, letterSpacing: 1.3, color: V.muted, textTransform: "uppercase", marginTop: 2 }}>{s.l}</div>
              </div>
            ))}
          </div>

          {sorted.map((entry, idx) => {
            const c = calc(entry);
            const open = expandedId === entry.id;
            return (
              <div key={entry.id} style={{ background: V.card, borderRadius: 14, border: `1px solid ${open ? V.borderHi : V.border}`, marginBottom: 10, overflow: "hidden" }}>
                <div onClick={() => setExpandedId(open ? null : entry.id)} style={{ padding: "11px 14px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", background: open ? V.accentDim : "transparent" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0 }}>
                    <span style={{ fontSize: 11, fontWeight: 700, fontFamily: mono, color: V.accent }}>#{idx + 1}</span>
                    <div style={{ minWidth: 0 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{entry.venue || "New Entry"}</div>
                      <div style={{ fontSize: 10, color: V.dim }}>{entry.date || "No date"} · {entry.mealType} · {entry.pax || 0} pax</div>
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                    <CapBadge status={c.capStatus} />
                    <span style={{ fontFamily: mono, fontSize: 12, fontWeight: 700 }}>₹{c.totalINR.toLocaleString("en-IN")}</span>
                    <span style={{ fontSize: 13, color: V.muted, transform: open ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▾</span>
                  </div>
                </div>
                {open && (
                  <div style={{ padding: 14, borderTop: `1px solid ${V.border}` }}>
                    <button onClick={() => setOcrTargetId(entry.id)} style={{ width: "100%", padding: 10, marginBottom: 12, background: V.accentDim, border: `1px dashed ${V.accent}`, borderRadius: 10, color: V.accent, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: sans, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>📸 Scan Receipt to Auto-Fill</button>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
                      <div><Label>Date</Label><Input type="date" value={entry.date} onChange={e => updateById(entry.id, "date", e.target.value)} /></div>
                      <div><Label>Meal Type</Label>
                        <select value={entry.mealType} onChange={e => updateById(entry.id, "mealType", e.target.value)} style={{ width: "100%", padding: "10px 14px", background: V.bg, border: `1px solid ${V.border}`, borderRadius: 8, color: V.text, fontSize: 13, fontFamily: mono, outline: "none", appearance: "auto", cursor: "pointer", boxSizing: "border-box" }}>
                          <option value="Breakfast/Tea">Breakfast / Tea</option><option value="Lunch">Lunch</option><option value="Dinner">Dinner</option>
                        </select>
                      </div>
                      <div><Label>Pax (incl. host)</Label><Input type="number" min="1" value={entry.pax} onChange={e => updateById(entry.id, "pax", e.target.value)} placeholder="0" /></div>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                      <div><Label>Venue</Label><Input value={entry.venue} onChange={e => updateById(entry.id, "venue", e.target.value)} placeholder="Restaurant name" /></div>
                      <div><Label>Occasion</Label><Input value={entry.occasion} onChange={e => updateById(entry.id, "occasion", e.target.value)} placeholder="e.g. Lunch with delegation" /></div>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
                      <div><Label>Cost INR (bill)</Label><Input type="number" min="0" value={entry.costINR} onChange={e => updateById(entry.id, "costINR", e.target.value)} placeholder="0" /></div>
                      <div><Label>Alcohol / Corkage</Label><Input type="number" min="0" value={entry.alcohol} onChange={e => updateById(entry.id, "alcohol", e.target.value)} placeholder="0" /></div>
                      <div><Label>Tips</Label><Input type="number" min="0" value={entry.tips} onChange={e => updateById(entry.id, "tips", e.target.value)} placeholder="0" /></div>
                    </div>
                    <div style={{ marginBottom: 12 }}><Label>Remarks</Label><Input value={entry.remarks} onChange={e => updateById(entry.id, "remarks", e.target.value)} placeholder="Optional" /></div>
                    <div style={{ background: V.bg, borderRadius: 10, padding: 11, display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 6, marginBottom: 12 }}>
                      {[{ l: "Total INR", v: "\u20B9"+c.totalINR.toLocaleString("en-IN") }, { l: "Total SGD", v: "S$"+c.totalSGD.toFixed(2) }, { l: "SGD/Pax", v: "S$"+c.sgdPerPax.toFixed(2) }, { l: "INR/Pax", v: "\u20B9"+c.inrPerPax.toFixed(0) }].map(x => (
                        <div key={x.l} style={{ textAlign: "center" }}>
                          <div style={{ fontSize: 13, fontWeight: 700, fontFamily: mono }}>{x.v}</div>
                          <div style={{ fontSize: 8, fontWeight: 700, letterSpacing: 1, color: V.muted, textTransform: "uppercase", marginTop: 2 }}>{x.l}</div>
                        </div>
                      ))}
                    </div>
                    {c.capStatus !== "none" && (
                      <div style={{ background: c.capStatus === "ok" ? V.greenBg : c.capStatus === "hom" ? V.amberBg : V.redBg, borderRadius: 10, padding: "8px 12px", marginBottom: 12, fontSize: 11, lineHeight: 1.5, color: c.capStatus === "ok" ? V.green : c.capStatus === "hom" ? V.amber : V.red }}>
                        {c.capStatus === "ok" && ("\u2713 Within " + entry.mealType + " cap of \u20B9" + c.cap.base.toLocaleString("en-IN") + "/pax")}
                        {c.capStatus === "hom" && ("\u26A0 Exceeds " + entry.mealType + " cap (\u20B9" + c.cap.base.toLocaleString("en-IN") + ") but within HOM approval limit (\u20B9" + c.cap.hbs120.toLocaleString("en-IN") + "). HOM approval required.")}
                        {c.capStatus === "over" && ("\u2715 Exceeds HOM limit of \u20B9" + c.cap.hbs120.toLocaleString("en-IN") + "/pax for " + entry.mealType + ". DS deviation approval required.")}
                      </div>
                    )}
                    <div style={{ borderTop: `1px solid ${V.border}`, paddingTop: 10 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: guestOpenId === entry.id && entry.guests.length ? 10 : 0 }}>
                        <button onClick={() => setGuestOpenId(guestOpenId === entry.id ? null : entry.id)} style={{ background: "none", border: `1px solid ${V.border}`, borderRadius: 8, padding: "5px 11px", color: V.dim, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: sans }}>👥 Guests ({entry.guests.length}) {guestOpenId === entry.id ? "▴" : "▾"}</button>
                        <button onClick={() => { addGuest(entry.id); setGuestOpenId(entry.id); }} style={{ background: V.accentDim, border: "none", borderRadius: 8, padding: "5px 11px", color: V.accent, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: sans }}>+ Guest</button>
                      </div>
                      {guestOpenId === entry.id && entry.guests.map((g, gi) => (
                        <div key={g.id} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 26px", gap: 6, marginBottom: 5, alignItems: "end" }}>
                          <div>{gi === 0 && <Label>Name</Label>}<Input small value={g.name} onChange={e => updateGuest(entry.id, g.id, "name", e.target.value)} placeholder="Name" /></div>
                          <div>{gi === 0 && <Label>Designation</Label>}<Input small value={g.designation} onChange={e => updateGuest(entry.id, g.id, "designation", e.target.value)} placeholder="Title" /></div>
                          <div>{gi === 0 && <Label>Organisation</Label>}<Input small value={g.organisation} onChange={e => updateGuest(entry.id, g.id, "organisation", e.target.value)} placeholder="Org" /></div>
                          <button onClick={() => removeGuest(entry.id, g.id)} style={{ background: V.redBg, border: "none", borderRadius: 6, width: 24, height: 24, color: V.red, cursor: "pointer", fontSize: 13, display: "flex", alignItems: "center", justifyContent: "center" }}>×</button>
                        </div>
                      ))}
                    </div>
                    {entries.length > 1 && <div style={{ marginTop: 12, textAlign: "right" }}><button onClick={() => removeEntry(entry.id)} style={{ background: "none", border: "none", color: V.muted, fontSize: 10, cursor: "pointer", fontFamily: sans, textDecoration: "underline" }}>Remove entry</button></div>}
                  </div>
                )}
              </div>
            );
          })}
          <button onClick={addEntry} style={{ width: "100%", padding: 12, background: V.white, border: `1px dashed ${V.border}`, borderRadius: 14, color: V.accent, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: sans, marginTop: 2 }}>+ Add Claim Entry</button>
        </>}

        {/* ═══ CAPS ═══ */}
        {tab === "caps" && <>
          <Label>FY26 Entertainment Rate Caps</Label><div style={{ height: 10 }} />
          {["Mission Staff (excl. HOM)", "HOM"].map((role, ri) => (
            <div key={role} style={{ background: V.card, borderRadius: 14, border: `1px solid ${V.border}`, padding: 14, marginBottom: 10 }}>
              <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 10, color: V.accent }}>{role}</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 1, background: V.border, borderRadius: 10, overflow: "hidden" }}>
                {["Meal", "Cap/Pax", ri === 0 ? "HOM (120%)" : "HOM (150%)"].map(h => (
                  <div key={h} style={{ background: V.bg, padding: "8px 10px", fontSize: 9, fontWeight: 700, letterSpacing: 1, color: V.muted, textTransform: "uppercase" }}>{h}</div>
                ))}
                {Object.entries(MEAL_CAPS).map(([meal, caps]) => [
                  <div key={meal+"n"} style={{ background: V.card, padding: 10, fontSize: 12, fontWeight: 600 }}>{meal}</div>,
                  <div key={meal+"c"} style={{ background: V.card, padding: 10, fontSize: 13, fontFamily: mono, fontWeight: 600 }}>₹{caps.base.toLocaleString("en-IN")}</div>,
                  <div key={meal+"l"} style={{ background: V.card, padding: 10, fontSize: 13, fontFamily: mono, fontWeight: 600 }}>₹{(ri === 0 ? caps.hbs120 : caps.hom150).toLocaleString("en-IN")}</div>,
                ])}
              </div>
            </div>
          ))}
        </>}

        {/* ═══ COPY TO EXCEL ═══ */}
        {tab === "export" && <>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div>
              <div style={{ fontSize: 13, fontWeight: 700 }}>Claim Form Data</div>
              <div style={{ fontSize: 10, color: V.dim, marginTop: 2 }}>Sorted oldest → newest. Paste into Row 11 (columns B–L)</div>
            </div>
            <CopyButton tableRef={claimTableRef} label="Copy Table" />
          </div>
          <div style={{ background: "#fff", borderRadius: 12, border: `1px solid ${V.border}`, overflow: "hidden", marginBottom: 28, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead><tr>
                  <th style={tHead}>Date</th><th style={tHead}>Venue</th><th style={tHead}>Occasion</th>
                  <th style={tHead}>No. of Pax</th><th style={tHead}>Cost in INR</th><th style={tHead}>Alcohol / Corkage</th>
                  <th style={tHead}>Tips</th><th style={tHead}>Total Claimable (INR)</th><th style={tHead}>Remarks</th>
                  <th style={tHead}>Total (SGD)</th><th style={tHead}>SGD per Pax</th>
                </tr></thead>
                <tbody ref={claimTableRef}>
                  {sorted.map((e) => { const c = calc(e); return (
                    <tr key={e.id}>
                      <td style={tCell}>{fmtDate(e.date)}</td>
                      <td style={{ ...tCell, whiteSpace: "normal", minWidth: 80 }}>{e.venue}</td>
                      <td style={{ ...tCell, whiteSpace: "normal", minWidth: 140 }}>{e.occasion}</td>
                      <td style={{ ...tCell, textAlign: "center" }}>{e.pax}</td>
                      <td style={{ ...tCell, textAlign: "right" }}>{e.costINR ? Number(e.costINR) : ""}</td>
                      <td style={{ ...tCell, textAlign: "right" }}>{e.alcohol ? Number(e.alcohol) : ""}</td>
                      <td style={{ ...tCell, textAlign: "right" }}>{e.tips ? Number(e.tips) : ""}</td>
                      <td style={{ ...tCell, textAlign: "right", fontWeight: 700 }}>{c.totalINR || ""}</td>
                      <td style={{ ...tCell, whiteSpace: "normal" }}>{e.remarks}</td>
                      <td style={{ ...tCell, textAlign: "right" }}>{c.totalSGD ? c.totalSGD.toFixed(2) : ""}</td>
                      <td style={{ ...tCell, textAlign: "right" }}>{c.sgdPerPax ? c.sgdPerPax.toFixed(2) : ""}</td>
                    </tr>
                  ); })}
                  <tr>
                    <td colSpan={7} style={{ ...tCell, textAlign: "right", fontWeight: 700, fontSize: 10, color: "#555", textTransform: "uppercase", letterSpacing: 1 }}>Total</td>
                    <td style={{ ...tCell, textAlign: "right", fontWeight: 700 }}>{grandINR || ""}</td>
                    <td style={tCell}></td>
                    <td style={{ ...tCell, textAlign: "right", fontWeight: 700 }}>{grandSGD ? grandSGD.toFixed(2) : ""}</td>
                    <td style={tCell}></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div>
              <div style={{ fontSize: 13, fontWeight: 700 }}>Guest List</div>
              <div style={{ fontSize: 10, color: V.dim, marginTop: 2 }}>{totalGuests > 0 ? 'Paste into a separate "Guest List" sheet' : "Add guests in the Claims tab first"}</div>
            </div>
            {totalGuests > 0 && <CopyButton tableRef={guestTableRef} label="Copy Guests" />}
          </div>
          {totalGuests > 0 ? (
            <div style={{ background: "#fff", borderRadius: 12, border: `1px solid ${V.border}`, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse" }}>
                  <thead><tr>
                    <th style={tHead}>S/N</th><th style={tHead}>Date</th><th style={tHead}>Venue</th>
                    <th style={tHead}>Occasion</th><th style={tHead}>Guests</th>
                  </tr></thead>
                  <tbody ref={guestTableRef}>
                    {(function() { var sn = 0; return sorted.filter(function(e) { return e.guests.length > 0; }).map(function(e) { sn++; return (
                        <tr key={e.id}>
                          <td style={{ ...tCell, textAlign: "center", verticalAlign: "top" }}>{sn}</td>
                          <td style={{ ...tCell, verticalAlign: "top" }}>{fmtDate(e.date)}</td>
                          <td style={{ ...tCell, whiteSpace: "normal", verticalAlign: "top" }}>{e.venue}</td>
                          <td style={{ ...tCell, whiteSpace: "normal", minWidth: 140, verticalAlign: "top" }}>{e.occasion}</td>
                          <td style={{ ...tCell, whiteSpace: "normal", minWidth: 200 }}>{e.guests.map(function(g) { var parts = [g.name]; if (g.designation) parts.push(g.designation); if (g.organisation) parts.push(g.organisation); return parts.join(", "); }).join("\n")}</td>
                        </tr>
                    ); }); })()}
                  </tbody>
                </table>
              </div>
            </div>
          ) : (
            <div style={{ background: V.card, borderRadius: 14, border: `1px solid ${V.border}`, padding: "30px 20px", textAlign: "center" }}>
              <div style={{ fontSize: 28, marginBottom: 6 }}>👥</div>
              <div style={{ fontSize: 12, color: V.dim }}>No guests added yet.</div>
            </div>
          )}
        </>}

        {/* ═══ SETTINGS ═══ */}
        {tab === "settings" && <>
          <Label>Receipt OCR Settings</Label><div style={{ height: 10 }} />
          <div style={{ background: V.card, borderRadius: 14, border: `1px solid ${V.border}`, padding: 18 }}>
            <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 4 }}>Anthropic API Key</div>
            <div style={{ fontSize: 11, color: V.dim, marginBottom: 10, lineHeight: 1.5 }}>
              Required for receipt scanning. Get one from <a href="https://console.anthropic.com" target="_blank" rel="noopener" style={{ color: V.accent }}>console.anthropic.com</a>. Your key stays in your browser only.
            </div>
            <Input type="password" value={apiKey} onChange={e => saveApiKey(e.target.value)} placeholder="sk-ant-..." />
            {apiKey && <div style={{ marginTop: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 11, color: V.green }}>✓ Key saved to this browser — persists across sessions</span>
              <button onClick={() => saveApiKey("")} style={{ background: V.redBg, border: "none", borderRadius: 6, padding: "4px 10px", color: V.red, fontSize: 10, fontWeight: 700, cursor: "pointer", fontFamily: sans }}>Clear key</button>
            </div>}
            {!apiKey && <div style={{ marginTop: 8, fontSize: 11, color: V.muted }}>Without a key, all features except OCR still work.</div>}
          </div>
        </>}

      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>


</body></html>
