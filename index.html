<script type="text/babel">
const { useState, useRef, useMemo } = React;

const FX_RATE = 70.74;
const BASE_RATE = 63.57;
const MEAL_CAPS = {
  "Breakfast/Tea": { base: Math.floor(50 * BASE_RATE), hbs120: Math.floor(1.2 * Math.floor(50 * BASE_RATE)), hom150: Math.floor(1.5 * Math.floor(50 * BASE_RATE)) },
  Lunch: { base: Math.floor(85 * BASE_RATE), hbs120: Math.floor(1.2 * Math.floor(85 * BASE_RATE)), hom150: Math.floor(1.5 * Math.floor(85 * BASE_RATE)) },
  Dinner: { base: Math.floor(120 * BASE_RATE), hbs120: Math.floor(1.2 * Math.floor(120 * BASE_RATE)), hom150: Math.floor(1.5 * Math.floor(120 * BASE_RATE)) },
};

const uid = () => Math.random().toString(36).slice(2, 10);
const emptyEntry = () => ({ id: uid(), date: "", venue: "", occasion: "", mealType: "Lunch", pax: "", costINR: "", alcohol: "", tips: "", remarks: "", guests: [] });
const emptyGuest = () => ({ id: uid(), name: "", designation: "", organisation: "" });

const V = {
  bg: "#f5f6f8", surface: "#ffffff", card: "#ffffff", border: "#dde1e8", borderHi: "#c0392b",
  accent: "#c0392b", accentDim: "rgba(192,57,43,0.07)", accentGlow: "rgba(192,57,43,0.2)",
  text: "#1a1a1a", dim: "#5f6b7a", muted: "#8d96a3",
  green: "#1e8449", greenBg: "rgba(30,132,73,0.08)",
  amber: "#b7791f", amberBg: "rgba(183,121,31,0.08)",
  red: "#c0392b", redBg: "rgba(192,57,43,0.07)",
  white: "#ffffff",
};
const mono = "'JetBrains Mono','Fira Code',monospace";
const sans = "'DM Sans','Segoe UI',system-ui,sans-serif";

function calc(e) {
  const cost = parseFloat(e.costINR) || 0, alc = parseFloat(e.alcohol) || 0, tip = parseFloat(e.tips) || 0;
  const totalINR = cost + alc + tip, totalSGD = totalINR / FX_RATE;
  const pax = parseInt(e.pax) || 0, sgdPerPax = pax > 0 ? totalSGD / pax : 0, inrPerPax = pax > 0 ? totalINR / pax : 0;
  const cap = MEAL_CAPS[e.mealType] || MEAL_CAPS.Lunch;
  const capStatus = inrPerPax === 0 ? "none" : inrPerPax <= cap.base ? "ok" : inrPerPax <= cap.hbs120 ? "hom" : "over";
  return { totalINR, totalSGD, sgdPerPax, inrPerPax, cap, capStatus };
}

function sortByDate(entries) {
  return [...entries].sort(function(a, b) {
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return a.date.localeCompare(b.date);
  });
}

function CapBadge({ status }) {
  if (status === "none") return null;
  const m = { ok: { l: "Within Cap", bg: V.greenBg, c: V.green, i: "\u2713" }, hom: { l: "HOM Approval", bg: V.amberBg, c: V.amber, i: "\u26A0" }, over: { l: "Exceeds Limit", bg: V.redBg, c: V.red, i: "\u2715" } };
  const d = m[status];
  return <span style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "2px 9px", borderRadius: 99, background: d.bg, color: d.c, fontSize: 10, fontWeight: 700, whiteSpace: "nowrap" }}>{d.i} {d.l}</span>;
}

function Input({ small, style: xs, ...props }) {
  const [f, setF] = useState(false);
  return <input {...props} onFocus={e => { setF(true); if (props.onFocus) props.onFocus(e); }} onBlur={e => { setF(false); if (props.onBlur) props.onBlur(e); }}
    style={{ width: "100%", padding: small ? "7px 10px" : "10px 14px", background: V.bg, border: `1px solid ${f ? V.borderHi : V.border}`, borderRadius: 8, color: V.text, fontSize: small ? 12 : 13, fontFamily: mono, outline: "none", transition: "border-color 0.2s", boxSizing: "border-box", ...(xs || {}) }} />;
}

function Label({ children }) {
  return <div style={{ fontSize: 9, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.5, color: V.muted, marginBottom: 4 }}>{children}</div>;
}

function CopyButton({ tableRef, label }) {
  const [copied, setCopied] = useState(false);
  const doCopy = () => {
    const el = tableRef.current; if (!el) return;
    const range = document.createRange(); range.selectNodeContents(el);
    const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
    document.execCommand("copy"); sel.removeAllRanges();
    setCopied(true); setTimeout(() => setCopied(false), 2000);
  };
  return (
    <button onClick={doCopy} style={{
      padding: "9px 18px", background: copied ? V.greenBg : V.accent, border: copied ? `1px solid ${V.green}` : "none",
      borderRadius: 8, color: copied ? V.green : V.white, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: sans,
      boxShadow: copied ? "none" : `0 2px 10px ${V.accentGlow}`, transition: "all 0.2s",
    }}>{copied ? "\u2713 Copied!" : label}</button>
  );
}

function OcrModal({ onClose, onApply, apiKey }) {
  const [preview, setPreview] = useState(null);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const inputRef = useRef(); const fileRef = useRef(null);
  const handleFile = (f) => { if (!f) return; fileRef.current = f; setError(null); setResult(null); const r = new FileReader(); r.onload = () => setPreview(r.result); r.readAsDataURL(f); };
  const runOCR = async () => {
    if (!fileRef.current) return;
    if (!apiKey) { setError("Set your Anthropic API key in the Settings tab first."); return; }
    setLoading(true); setError(null);
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000,
          messages: [{ role: "user", content: [
            { type: "image", source: { type: "base64", media_type: fileRef.current.type || "image/jpeg", data: preview.split(",")[1] } },
            { type: "text", text: `Extract from this Indian restaurant receipt. ONLY valid JSON, no markdown:\n{"venue":"name","date":"YYYY-MM-DD","total_amount":number,"alcohol_amount":0,"tip_amount":0,"pax_estimate":null,"meal_type":"Lunch","items_summary":"brief"}` }
          ]}]
        })
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error.message);
      setResult(JSON.parse((data.content || []).map(b => b.text || "").join("").replace(/```json|```/g, "").trim()));
    } catch (err) { setError(err.message || "Could not process. Try a clearer photo."); } finally { setLoading(false); }
  };
  const handleApply = () => { if (!result) return; onApply({ date: result.date||"", venue: result.venue||"", occasion: result.items_summary||"", mealType: result.meal_type||"Lunch", pax: result.pax_estimate?String(result.pax_estimate):"", costINR: result.total_amount?String(result.total_amount):"", alcohol: result.alcohol_amount?String(result.alcohol_amount):"", tips: result.tip_amount?String(result.tip_amount):"" }); onClose(); };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 999, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: V.white, borderRadius: 16, border: `1px solid ${V.border}`, width: "100%", maxWidth: 460, maxHeight: "90vh", overflow: "auto", padding: 22, boxShadow: "0 20px 60px rgba(0,0,0,0.15)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: V.text }}>📸 Scan Receipt</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: V.muted, fontSize: 20, cursor: "pointer" }}>×</button>
        </div>
        {!preview && (
          <div onClick={() => inputRef.current && inputRef.current.click()} style={{ border: `2px dashed ${V.border}`, borderRadius: 12, padding: "36px 20px", textAlign: "center", cursor: "pointer" }}>
            <div style={{ fontSize: 34, marginBottom: 6 }}>🧾</div>
            <div style={{ fontSize: 13, fontWeight: 600, color: V.text }}>Tap to upload receipt</div>
            <div style={{ fontSize: 11, color: V.dim, marginTop: 2 }}>JPG, PNG, HEIC</div>
            <input ref={inputRef} type="file" accept="image/*" capture="environment" onChange={e => handleFile(e.target.files && e.target.files[0])} style={{ display: "none" }} />
          </div>
        )}
        {preview && !result && (
          <div>
            <div style={{ borderRadius: 10, overflow: "hidden", marginBottom: 12, border: `1px solid ${V.border}` }}>
              <img src={preview} alt="" style={{ width: "100%", display: "block", maxHeight: 260, objectFit: "contain", background: "#fafafa" }} />
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => { setPreview(null); fileRef.current = null; }} style={{ flex: 1, padding: 10, background: V.bg, border: `1px solid ${V.border}`, borderRadius: 10, color: V.dim, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: sans }}>Re-take</button>
              <button onClick={runOCR} disabled={loading} style={{ flex: 2, padding: 10, background: loading ? V.bg : V.accent, border: "none", borderRadius: 10, color: V.white, fontSize: 12, fontWeight: 700, cursor: loading ? "wait" : "pointer", fontFamily: sans, opacity: loading ? 0.7 : 1 }}>{loading ? "⏳ Extracting..." : "Extract Data"}</button>
            </div>
          </div>
        )}
        {error && <div style={{ marginTop: 12, padding: "9px 12px", background: V.redBg, borderRadius: 8, fontSize: 12, color: V.red }}>{error}</div>}
        {result && (
          <div>
            <Label>Extracted Data</Label>
            <div style={{ background: V.bg, borderRadius: 10, padding: 12, margin: "8px 0 14px" }}>
              {[["Venue", result.venue],["Date", result.date],["Meal", result.meal_type],["Bill", result.total_amount ? "\u20B9"+Number(result.total_amount).toLocaleString("en-IN") : "\u2014"],["Alcohol", result.alcohol_amount ? "\u20B9"+Number(result.alcohol_amount).toLocaleString("en-IN") : "\u2014"],["Tips", result.tip_amount ? "\u20B9"+Number(result.tip_amount).toLocaleString("en-IN") : "\u2014"],["Pax", result.pax_estimate || "\u2014"],["Items", result.items_summary]].map(function([k, v]) { return (
                <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", borderBottom: `1px solid ${V.border}` }}>
                  <span style={{ fontSize: 11, color: V.dim, fontWeight: 600 }}>{k}</span>
                  <span style={{ fontSize: 12, color: V.text, fontWeight: 500, textAlign: "right", maxWidth: "60%" }}>{v || "\u2014"}</span>
                </div>
              ); })}
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => { setResult(null); setPreview(null); fileRef.current = null; }} style={{ flex: 1, padding: 10, background: V.bg, border: `1px solid ${V.border}`, borderRadius: 10, color: V.dim, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: sans }}>Retry</button>
              <button onClick={handleApply} style={{ flex: 2, padding: 10, background: V.accent, border: "none", borderRadius: 10, color: V.white, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: sans }}>✓ Apply</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

                {Object.entries(MEAL_CAPS).map(([meal, caps]) => [
                  <div key={meal+"n"} style={{ background: V.card, padding: 10, fontSize: 12, fontWeight: 600 }}>{meal}</div>,
                  <div key={meal+"c"} style={{ background: V.card, padding: 10, fontSize: 13, fontFamily: mono, fontWeight: 600 }}>₹{caps.base.toLocaleString("en-IN")}</div>,
                  <div key={meal+"l"} style={{ background: V.card, padding: 10, fontSize: 13, fontFamily: mono, fontWeight: 600 }}>₹{(ri === 0 ? caps.hbs120 : caps.hom150).toLocaleString("en-IN")}</div>,
                ])}
              </div>
            </div>
          ))}
        </>}

        {/* ═══ COPY TO EXCEL ═══ */}
        {tab === "export" && <>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div>
              <div style={{ fontSize: 13, fontWeight: 700 }}>Claim Form Data</div>
              <div style={{ fontSize: 10, color: V.dim, marginTop: 2 }}>Sorted oldest → newest. Paste into Row 11 (columns B–L)</div>
            </div>
            <CopyButton tableRef={claimTableRef} label="Copy Table" />
          </div>
          <div style={{ background: "#fff", borderRadius: 12, border: `1px solid ${V.border}`, overflow: "hidden", marginBottom: 28, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead><tr>
                  <th style={tHead}>Date</th><th style={tHead}>Venue</th><th style={tHead}>Occasion</th>
                  <th style={tHead}>No. of Pax</th><th style={tHead}>Cost in INR</th><th style={tHead}>Alcohol / Corkage</th>
                  <th style={tHead}>Tips</th><th style={tHead}>Total Claimable (INR)</th><th style={tHead}>Remarks</th>
                  <th style={tHead}>Total (SGD)</th><th style={tHead}>SGD per Pax</th>
                </tr></thead>
                <tbody ref={claimTableRef}>
                  {sorted.map((e) => { const c = calc(e); return (
                    <tr key={e.id}>
                      <td style={tCell}>{fmtDate(e.date)}</td>
                      <td style={{ ...tCell, whiteSpace: "normal", minWidth: 80 }}>{e.venue}</td>
                      <td style={{ ...tCell, whiteSpace: "normal", minWidth: 140 }}>{e.occasion}</td>
                      <td style={{ ...tCell, textAlign: "center" }}>{e.pax}</td>
                      <td style={{ ...tCell, textAlign: "right" }}>{e.costINR ? Number(e.costINR) : ""}</td>
                      <td style={{ ...tCell, textAlign: "right" }}>{e.alcohol ? Number(e.alcohol) : ""}</td>
                      <td style={{ ...tCell, textAlign: "right" }}>{e.tips ? Number(e.tips) : ""}</td>
                      <td style={{ ...tCell, textAlign: "right", fontWeight: 700 }}>{c.totalINR || ""}</td>
                      <td style={{ ...tCell, whiteSpace: "normal" }}>{e.remarks}</td>
                      <td style={{ ...tCell, textAlign: "right" }}>{c.totalSGD ? c.totalSGD.toFixed(2) : ""}</td>
                      <td style={{ ...tCell, textAlign: "right" }}>{c.sgdPerPax ? c.sgdPerPax.toFixed(2) : ""}</td>
                    </tr>
                  ); })}
                  <tr>
                    <td colSpan={7} style={{ ...tCell, textAlign: "right", fontWeight: 700, fontSize: 10, color: "#555", textTransform: "uppercase", letterSpacing: 1 }}>Total</td>
                    <td style={{ ...tCell, textAlign: "right", fontWeight: 700 }}>{grandINR || ""}</td>
                    <td style={tCell}></td>
                    <td style={{ ...tCell, textAlign: "right", fontWeight: 700 }}>{grandSGD ? grandSGD.toFixed(2) : ""}</td>
                    <td style={tCell}></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div>
              <div style={{ fontSize: 13, fontWeight: 700 }}>Guest List</div>
              <div style={{ fontSize: 10, color: V.dim, marginTop: 2 }}>{totalGuests > 0 ? 'Paste into a separate "Guest List" sheet' : "Add guests in the Claims tab first"}</div>
            </div>
            {totalGuests > 0 && <CopyButton tableRef={guestTableRef} label="Copy Guests" />}
          </div>
          {totalGuests > 0 ? (
            <div style={{ background: "#fff", borderRadius: 12, border: `1px solid ${V.border}`, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse" }}>
                  <thead><tr>
                    <th style={tHead}>S/N</th><th style={tHead}>Date</th><th style={tHead}>Venue</th>
                    <th style={tHead}>Occasion</th><th style={tHead}>Guests</th>
                  </tr></thead>
                  <tbody ref={guestTableRef}>
                    {(function() { var sn = 0; return sorted.filter(function(e) { return e.guests.length > 0; }).map(function(e) { sn++; return (
                        <tr key={e.id}>
                          <td style={{ ...tCell, textAlign: "center", verticalAlign: "top" }}>{sn}</td>
                          <td style={{ ...tCell, verticalAlign: "top" }}>{fmtDate(e.date)}</td>
                          <td style={{ ...tCell, whiteSpace: "normal", verticalAlign: "top" }}>{e.venue}</td>
                          <td style={{ ...tCell, whiteSpace: "normal", minWidth: 140, verticalAlign: "top" }}>{e.occasion}</td>
                          <td style={{ ...tCell, whiteSpace: "normal", minWidth: 200 }}>{e.guests.map(function(g) { var parts = [g.name]; if (g.designation) parts.push(g.designation); if (g.organisation) parts.push(g.organisation); return parts.join(", "); }).join("\n")}</td>
                        </tr>
                    ); }); })()}
                  </tbody>
                </table>
              </div>
            </div>
          ) : (
            <div style={{ background: V.card, borderRadius: 14, border: `1px solid ${V.border}`, padding: "30px 20px", textAlign: "center" }}>
              <div style={{ fontSize: 28, marginBottom: 6 }}>👥</div>
              <div style={{ fontSize: 12, color: V.dim }}>No guests added yet.</div>
            </div>
          )}
        </>}

        {/* ═══ SETTINGS ═══ */}
        {tab === "settings" && <>
          <Label>Receipt OCR Settings</Label><div style={{ height: 10 }} />
          <div style={{ background: V.card, borderRadius: 14, border: `1px solid ${V.border}`, padding: 18 }}>
            <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 4 }}>Anthropic API Key</div>
            <div style={{ fontSize: 11, color: V.dim, marginBottom: 10, lineHeight: 1.5 }}>
              Required for receipt scanning. Get one from <a href="https://console.anthropic.com" target="_blank" rel="noopener" style={{ color: V.accent }}>console.anthropic.com</a>. Your key stays in your browser only.
            </div>
            <Input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="sk-ant-..." />
            {apiKey && <div style={{ marginTop: 8, fontSize: 11, color: V.green }}>✓ Key set — receipt scanning enabled</div>}
            {!apiKey && <div style={{ marginTop: 8, fontSize: 11, color: V.muted }}>Without a key, all features except OCR still work.</div>}
          </div>
        </>}

      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>


</body></html>
